# Judge0 configuration. CHANGE the two passwords below before deploying.
# Full reference: https://github.com/judge0/judge0/blob/master/judge0.conf

################################################################################
# Postgres
################################################################################
POSTGRES_HOST=db
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=CHANGE_ME_strong_db_password

################################################################################
# Redis
################################################################################
REDIS_HOST=redis
REDIS_PASSWORD=CHANGE_ME_strong_redis_password

################################################################################
# Server
################################################################################
# Restrict who can call the API. Generate a token and set the same value as
# JUDGE0_TOKEN in your Vercel env vars. Leave blank to allow unauthenticated.
# AUTHN_TOKEN=

# Reasonable limits for a teaching lab.
MAX_QUEUE_SIZE=100
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=128000
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_NETWORK=false
